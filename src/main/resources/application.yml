spring:
  application:
    name: harbinger

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-6
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: llama3.2

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

harbinger:
  security:
    api-key: ${HARBINGER_API_KEY:}
  projects:
    api-meter:
      path: ${HARBINGER_PROJECT_API_METER_PATH:${user.home}/pet-projects/api-meter}
    hermes:
      path: ${HARBINGER_PROJECT_HERMES_PATH:${user.home}/pet-projects/hermes}
    junto-app:
      path: ${HARBINGER_PROJECT_JUNTO_PATH:${user.home}/pet-projects/junto-app}
    hr-vacancy-bot-aws:
      path: ${HARBINGER_PROJECT_HR_PATH:${user.home}/pet-projects/hr-vacancy-bot-aws}
    resume:
      path: ${HARBINGER_PROJECT_RESUME_PATH:${user.home}/pet-projects/resume}
